name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks needs full history to scan commit-by-commit

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan
        run: |
          # --redact: replace any leaked value with REDACTED in the report
          # --no-banner: cleaner CI logs
          gitleaks detect --source . --config .gitleaks.toml --redact --no-banner -v
